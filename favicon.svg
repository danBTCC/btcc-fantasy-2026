<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0b0f19"/>

  <!-- Start / Finish chequer stripe -->
  <g transform="translate(6,4)">
    <rect width="6" height="6" fill="white"/>
    <rect y="6" width="6" height="6" fill="black"/>
    <rect y="12" width="6" height="6" fill="white"/>
    <rect y="18" width="6" height="6" fill="black"/>
    <rect y="24" width="6" height="6" fill="white"/>
    <rect y="30" width="6" height="6" fill="black"/>
    <rect y="36" width="6" height="6" fill="white"/>
    <rect y="42" width="6" height="6" fill="black"/>
    <rect y="48" width="6" height="6" fill="white"/>
  </g>

  <!-- BTCC -->
  <text x="38"
        y="26"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        font-weight="bold"
